# ============================================================================
# نردبان — reverse proxy (OPS-05)
#  - /api, /uploads, /socket.io, /api/health → backend:4000
#  - بقیه (صفحات Next.js)                     → frontend:3000
#  - پشتیبانی WebSocket برای چت real-time
#  - هدرهای امنیتی + X-Forwarded-* (سرور trust proxy=1 دارد)
#
# SSL: بلاک HTTPS پایین پس از گرفتن گواهی Let's Encrypt فعال می‌شود (OPS بعدی/همین‌جا).
#      تا آن زمان روی HTTP (پورت ۸۰) کار می‌کند.
# ============================================================================

# هدرهای امنیتی مشترک (در همهٔ پاسخ‌ها)
# توجه: HSTS فقط وقتی روی HTTPS هستید فعال شود (در بلاک 443 پایین).
map $sent_http_content_type $nardeban_nosniff { default "nosniff"; }

# ----------------------------------------------------------------------------
# upstreamها — بسته به اینکه nginx کجا اجرا می‌شود:
#
#  حالت A) nginx داخل docker compose (همین repo، توصیه‌شده) → از نام سرویس استفاده کنید:
#            server backend:4000;   /   server frontend:3000;
#
#  حالت B) nginx مستقیم روی Ubuntu نصب شده (sudo apt install nginx) → چون compose
#          پورت‌ها را روی 127.0.0.1 bind کرده، از localhost استفاده کنید:
#            server 127.0.0.1:4000;  /  server 127.0.0.1:3000;
#
# پیش‌فرض زیر برای حالت A (داخل Docker) است. اگر nginx روی خود سرور است،
# دو خط server را به نسخهٔ 127.0.0.1 تغییر دهید.
# ----------------------------------------------------------------------------
upstream nardeban_backend {
    server backend:4000;       # حالت B (host nginx): 127.0.0.1:4000
    keepalive 32;
}
upstream nardeban_frontend {
    server frontend:3000;      # حالت B (host nginx): 127.0.0.1:3000
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # در پروداکشن: دامنهٔ واقعی مثل nardeban.example.com

    # مسیر چالش Let's Encrypt (برای صدور/تمدید گواهی با webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- پس از فعال‌سازی SSL، این بلاک را uncomment کنید تا HTTP→HTTPS ریدایرکت شود ---
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # هدرهای امنیتی پایه
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- فایل‌های static نکست (immutable hash دارند → کش طولانی) ---
    # باید قبل از catch-all `location /` بیاید تا اولویت داشته باشد.
    location /_next/static/ {
        proxy_pass http://nardeban_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Connection "";
        # فایل‌های static نکست hash دارند → immutable و کش طولانی.
        # فقط یک Cache-Control می‌گذاریم (بدون expires تا هدر تکراری نشود).
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- API ---
    location /api/ {
        proxy_pass http://nardeban_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # --- فایل‌های آپلودشده ---
    # کش توسط خود backend ست می‌شود (Express static: maxAge 30d + immutable)؛
    # اینجا فقط پروکسی می‌کنیم تا هدر Cache-Control تکراری نشود.
    location /uploads/ {
        proxy_pass http://nardeban_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # --- Socket.io (WebSocket چت real-time) ---
    location /socket.io/ {
        proxy_pass http://nardeban_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # اتصال طولانی WebSocket
        proxy_send_timeout 3600s;
    }

    # --- فرانت (Next.js) — هر چیز دیگر ---
    location / {
        proxy_pass http://nardeban_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;   # برای HMR/Next در صورت نیاز
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

