# ============================================================================
# نردبان — تنظیمات سطح http برای nginx میزبان
# نصب در: /etc/nginx/conf.d/nardeban-ratelimit.conf
# (این بخش‌ها باید در context سطح http باشند، نه داخل server)
# ============================================================================

# map برای ارتقای WebSocket (Socket.io / HMR)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# (۴) rate-limit ضد اسپم روی API — ۱۰ درخواست در ثانیه per IP، با burst
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
