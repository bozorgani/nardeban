# ============================================================================
# نردبان — تنظیمات سطح http برای nginx میزبان
# نصب در: /etc/nginx/conf.d/nardeban-ratelimit.conf
# (این بخش‌ها باید در context سطح http باشند، نه داخل server)
# ============================================================================

# map برای ارتقای WebSocket (Socket.io / HMR)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ----------------------------------------------------------------------------
# 🔒 Cloudflare real-IP (M7)
# ----------------------------------------------------------------------------
# با این تنظیمات، nginx به‌جای IP لبهٔ کلودفلر، IP واقعی کاربر را در
# $remote_addr می‌گذارد (از هدر CF-Connecting-IP) و سپس همان را در
# X-Forwarded-For به Express forward می‌کند. بدون این، همهٔ rate limitها
# روی IP لبهٔ کلودفلر اعمال می‌شدند (bypass عملی).
#
# لیست رنج‌های زیر را با کامند به‌روز نگه‌دارید:
#   curl https://www.cloudflare.com/ips-v4 | xargs -I{} echo "set_real_ip_from {};"
#   curl https://www.cloudflare.com/ips-v6 | xargs -I{} echo "set_real_ip_from {};"
# (آخرین به‌روزرسانی: ژوئن ۲۰۲۴ — اگر سال‌ها بعد ست‌آپ می‌کنید، حتماً refresh کنید)
#
# IPv4 ranges:
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6 ranges:
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# هدری که کلودفلر IP واقعی کاربر را در آن می‌گذارد
real_ip_header CF-Connecting-IP;
# اگر مستقیم بدون CF تست می‌کنید، CF-Connecting-IP نیست → nginx همان
# $remote_addr (= IP کاربر) را حفظ می‌کند، چیزی خراب نمی‌شود.

# (۴) rate-limit ضد اسپم روی API — ۱۰ درخواست در ثانیه per IP، با burst
# توجه: $binary_remote_addr حالا IP واقعی کاربر است (به لطف real_ip بالا)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
