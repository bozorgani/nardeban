# ============================================================================
# نردبان — کانفیگ nginx میزبان (نصب‌شده مستقیم روی Ubuntu، نه داکر)
#
# نصب:
#   sudo cp nginx/nardeban.conf            /etc/nginx/sites-available/nardeban
#   sudo cp nginx/nardeban-ratelimit.conf  /etc/nginx/conf.d/nardeban-ratelimit.conf
#   sudo ln -s /etc/nginx/sites-available/nardeban /etc/nginx/sites-enabled/nardeban
#   sudo rm -f /etc/nginx/sites-enabled/default        # حذف سایت پیش‌فرض
#   sudo nginx -t && sudo systemctl reload nginx
#
# پیش‌نیاز: docker compose بالا باشد (backend روی 127.0.0.1:4000، frontend روی 127.0.0.1:3000).
# بلاک map و limit_req_zone در context سطح http هستند → در nardeban-ratelimit.conf قرار دارند.
# ============================================================================

# چون docker-compose پورت‌ها را روی 127.0.0.1 bind کرده، upstream = localhost
upstream nardeban_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}
upstream nardeban_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name befrosh.ir www.befrosh.ir;

    # سقف حجم بدنه — کمی بیشتر از آپلود ۵ مگابایتیِ multer
    client_max_body_size 10m;

    # مسیر چالش Let's Encrypt (برای صدور/تمدید گواهی با webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- پس از فعال‌سازی SSL، این بلاک را uncomment کنید تا HTTP→HTTPS ریدایرکت شود ---
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # هدرهای امنیتی پایه
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- (۱) health endpoint جدا — بدون لاگ، بدون rate-limit (برای Uptime Kuma و...) ---
    location = /api/health {
        proxy_pass http://nardeban_backend;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Connection "";
        access_log off;
    }

    # --- فایل‌های static نکست (immutable hash دارند → کش طولانی) ---
    location /_next/static/ {
        proxy_pass http://nardeban_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- (۴) API با rate-limit ضد اسپم ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://nardeban_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # --- (۳) فایل‌های آپلودشده — buffering خاموش برای multer/آپلود مستقیم ---
    # کش توسط خود backend ست می‌شود (Express static: maxAge 30d + immutable).
    location /uploads/ {
        proxy_pass http://nardeban_backend;
        proxy_http_version 1.1;
        proxy_request_buffering off;           # آپلود مستقیم به backend (بهتر برای multer)
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # --- Socket.io (WebSocket چت real-time) ---
    location /socket.io/ {
        proxy_pass http://nardeban_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # اتصال طولانی WebSocket
        proxy_send_timeout 3600s;
    }

    # --- فرانت (Next.js) — هر چیز دیگر ---
    # (۲) timeout بیشتر برای SSR بعضی صفحات
    location / {
        proxy_pass http://nardeban_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ============================================================================
# بلاک HTTPS — پس از صدور گواهی Let's Encrypt (certbot) به‌صورت خودکار اضافه/تنظیم می‌شود:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d nardeban.example.com
# certbot خودش بلاک 443 + ریدایرکت 80→443 + تمدید خودکار را می‌سازد.
# ============================================================================
