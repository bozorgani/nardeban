# ============================================================================
# نردبان — کانفیگ nginx میزبان (Ubuntu) + HTTPS با Cloudflare Origin Certificate
#
# نصب:
#   sudo mkdir -p /etc/nginx/ssl
#   # دو فایل گواهی Origin از Cloudflare را اینجا بگذارید:
#   #   /etc/nginx/ssl/befrosh.ir.pem   (Origin Certificate)
#   #   /etc/nginx/ssl/befrosh.ir.key   (Private Key)
#   sudo cp nginx/nardeban-ratelimit.conf  /etc/nginx/conf.d/nardeban-ratelimit.conf
#   sudo cp nginx/proxy-params.conf        /etc/nginx/proxy-params.conf
#   sudo cp nginx/nardeban.conf            /etc/nginx/sites-available/nardeban
#   sudo ln -s /etc/nginx/sites-available/nardeban /etc/nginx/sites-enabled/nardeban
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare: SSL/TLS mode = Full (strict)
# پیش‌نیاز: docker compose بالا باشد (backend 127.0.0.1:4000، frontend 127.0.0.1:3000)
# ============================================================================

upstream nardeban_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}
upstream nardeban_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ---------- HTTP (پورت ۸۰): ریدایرکت کامل به HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name befrosh.ir www.befrosh.ir;
    return 301 https://$host$request_uri;
}

# ---------- HTTPS (پورت ۴۴۳) ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name befrosh.ir www.befrosh.ir;

    # گواهی Origin کلودفلر (۱۵ ساله)
    ssl_certificate     /etc/nginx/ssl/befrosh.ir.pem;
    ssl_certificate_key /etc/nginx/ssl/befrosh.ir.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # سقف حجم بدنه — کمی بیشتر از آپلود ۵ مگابایتیِ multer
    client_max_body_size 10m;

    # هدرهای امنیتی
    # نکته: X-Content-Type-Options / X-Frame-Options / Referrer-Policy و CSP
    # توسط خود Next.js روی پاسخ صفحات ست می‌شوند (next.config.mjs → headers()).
    # اینجا تکرارشان نمی‌کنیم تا هدر دوتایی (duplicate) ساخته نشود.
    # فقط HSTS را اینجا می‌گذاریم چون Next آن را ست نمی‌کند و باید روی همهٔ
    # پاسخ‌ها (شامل /uploads و /api) اعمال شود.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- (۱) health endpoint جدا — بدون لاگ ---
    location = /api/health {
        proxy_pass http://nardeban_backend;
        include /etc/nginx/proxy-params.conf;
        access_log off;
    }

    # --- فایل‌های static نکست (کش طولانی) ---
    location /_next/static/ {
        proxy_pass http://nardeban_frontend;
        include /etc/nginx/proxy-params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- static public files (آیکون‌ها/فونت‌ها/manifest/offline/sw) ---
    # فایل‌هایی که یا hashدارند یا به‌ندرت تغییر می‌کنند. برای sw.js عمداً TTL را
    # کوتاه می‌گذاریم تا نسخهٔ جدید سریع‌تر کشف شود.
    location /icons/ {
        proxy_pass http://nardeban_frontend;
        include /etc/nginx/proxy-params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    location /fonts/ {
        proxy_pass http://nardeban_frontend;
        include /etc/nginx/proxy-params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    location = /manifest.json {
        proxy_pass http://nardeban_frontend;
        include /etc/nginx/proxy-params.conf;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
    }
    location = /offline.html {
        proxy_pass http://nardeban_frontend;
        include /etc/nginx/proxy-params.conf;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
    }
    location = /sw.js {
        proxy_pass http://nardeban_frontend;
        include /etc/nginx/proxy-params.conf;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # --- (۴) API با rate-limit ضد اسپم ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://nardeban_backend;
        include /etc/nginx/proxy-params.conf;
        proxy_read_timeout 60s;
        add_header Cache-Control "private, no-cache" always;
    }

    # --- (۳) فایل‌های آپلودشده — buffering خاموش برای multer ---
    # عکس‌های آپلودشده immutable اند (نام یکتا دارند) → کش طولانی برای کاهش
    # درخواست تکراری و بهبود امتیاز «uses-long-cache-ttl» در Lighthouse.
    location /uploads/ {
        proxy_pass http://nardeban_backend;
        include /etc/nginx/proxy-params.conf;
        proxy_request_buffering off;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- Socket.io (WebSocket چت real-time) ---
    location /socket.io/ {
        proxy_pass http://nardeban_backend;
        include /etc/nginx/proxy-params.conf;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- فرانت (Next.js) — هر چیز دیگر ---
    location / {
        proxy_pass http://nardeban_frontend;
        include /etc/nginx/proxy-params.conf;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
