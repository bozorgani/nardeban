

services:

  mongodb:
    image: mongo:7
    container_name: nardeban-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./server
    container_name: nardeban-backend
    restart: always
    depends_on:
      - mongodb
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./client
      # NEXT_PUBLIC_* در زمان build داخل باندل قرار می‌گیرند (نه runtime)
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: nardeban-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - ./client/.env.local
    ports:
      - "3000:3000"

volumes:
  mongo_data:
