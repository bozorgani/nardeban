# ============================================================================
# نردبان — docker-compose پروداکشن (OPS-03)
#
# نکات کلیدی:
#  - Mongo روی شبکهٔ داخلی است و پورتش به بیرون expose نمی‌شود (امنیت).
#  - احراز هویت Mongo با کاربر/رمز از .env فعال است.
#  - healthcheck برای هر سرویس + depends_on با شرط سلامت → ترتیب استارت درست.
#  - پورت‌های backend/frontend فقط روی 127.0.0.1 bind می‌شوند تا nginx (OPS-05)
#    جلوی آن‌ها بنشیند و چیزی مستقیم از اینترنت در دسترس نباشد.
#  - آپلودها روی والیوم نام‌دار می‌مانند (پایداری — مرتبط با OPS-04).
#
# اجرا:  cp .env.example .env  &&  ویرایش .env  &&  docker compose up -d --build
# ============================================================================

services:
  mongodb:
    image: mongo:7
    container_name: nardeban-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: nardeban
    volumes:
      - mongo_data:/data/db
    networks:
      - nardeban-net
    # بدون ports → فقط از شبکهٔ داخلی در دسترس است (نه از اینترنت)
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build: ./server
    container_name: nardeban-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      # اتصال به Mongo از طریق شبکهٔ داخلی با احراز هویت
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/nardeban?authSource=admin
    env_file:
      - ./server/.env
    volumes:
      # آپلودهای کاربران باید پایدار بمانند (OPS-04)
      - uploads_data:/app/uploads
    networks:
      - nardeban-net
    # فقط روی لوکال‌هاست سرور (nginx جلوی آن می‌نشیند)
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: ./client
      # NEXT_PUBLIC_* در زمان build داخل باندل قرار می‌گیرند (نه runtime)
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: nardeban-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
    networks:
      - nardeban-net
    # فقط روی لوکال‌هاست سرور (nginx جلوی آن می‌نشیند)
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: nardeban-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # برای SSL (Let's Encrypt) — هنگام فعال‌سازی استفاده می‌شوند
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    networks:
      - nardeban-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  nardeban-net:
    driver: bridge

volumes:
  mongo_data:
  uploads_data:
  certbot_conf:
  certbot_www:
